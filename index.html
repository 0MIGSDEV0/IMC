<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de IMC</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg">
    <div class="card">
      <div class="card-head">
        <div class="neon-title">⚡ Calculadora de IMC</div>
        <div class="neon-sub">Índice de Massa Corporal</div>
      </div>
      <div class="divider"></div>
      <div class="card-body">
        <div class="field-row">
          <div class="field">
            <label for="peso">Peso</label>
            <div class="suffix">
              <input type="number" id="peso" placeholder="70" min="1" step="0.1">
              <span>kg</span>
            </div>
          </div>
          <div class="field">
            <label for="altura">Altura</label>
            <div class="suffix">
              <input type="number" id="altura" placeholder="170" min="1" step="1">
              <span>cm</span>
            </div>
          </div>
        </div>
        <div class="field">
          <label for="sexo">Sexo biológico</label>
          <select id="sexo">
            <option value="neutro">Prefiro não informar</option>
            <option value="m">Masculino</option>
            <option value="f">Feminino</option>
          </select>
        </div>
        <div class="field">
          <label for="idade">Idade</label>
          <div class="suffix">
            <input type="number" id="idade" placeholder="25" min="1" max="120" step="1">
            <span>anos</span>
          </div>
        </div>

        <button class="btn" onclick="calcIMC()">Calcular</button>

        <div class="result" id="resultado">
          <div class="imc-num" id="imcVal">—</div>
          <div class="imc-label" id="imcLabel">—</div>
          <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
          <div class="imc-detail" id="imcDetail">—</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
